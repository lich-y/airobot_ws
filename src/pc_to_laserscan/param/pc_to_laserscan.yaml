/**:
  ros__parameters:
    # Input/Output topics
    input_pointcloud_topic: '/livox/lidar'
    output_scan_topic: '/scan'
    target_frame: 'laser_link'
    
    # Transform settings
    transform_tolerance: 0.01
    
    # Height filtering
    min_height: 0.0
    max_height: 1.0
    
    # Scan angle settings
    angle_min: -3.14159  # -PI
    angle_max: 3.14159   # PI
    angle_increment: 0.0087  # ~0.5 degree
    scan_time: 0.1
    
    # Range settings
    range_min: 0.1
    range_max: 10.0
    
    # Inf value settings
    inf_epsilon: 1.0
