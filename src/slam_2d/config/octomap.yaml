octomap_server:
  ros__parameters:
    resolution: 0.05
    frame_id: "odom"
    latch: true
    max_depth: 16
    use_sim_time: false

    point_cloud_min_z: 0.1
    point_cloud_max_z: 1.5
    point_cloud_min_x: -1.7976931348623157e+308
    point_cloud_max_x: 1.7976931348623157e+308
    point_cloud_min_y: -1.7976931348623157e+308
    point_cloud_max_y: 1.7976931348623157e+308
    occupancy_min_z: -100.0
    occupancy_max_z: 100.0
    filter_speckles: false
    filter_ground_plane: false

    min_x_size: 0.0
    min_y_size: 0.0

    base_frame_id: "base_link"
    publish_free_space: false
    colored_map: false
    use_height_map: false
    incremental_2D_projection: false
    compress_map: true

    color:
      r: 0.0
      g: 0.0
      b: 1.0
      a: 1.0
    color_factor: 0.8

    color_free:
      r: 0.0
      g: 1.0
      b: 0.0
      a: 1.0

    sensor_model:
      max_range: 100.0
      hit: 0.7
      miss: 0.4
      min: 0.12
      max: 0.97

    ground_filter:
      distance: 0.04
      angle: 0.15
      plane_distance: 0.07

    octomap_path: ""
